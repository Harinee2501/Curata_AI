# config.yaml
# ─────────────────────────────────────────────────────────────────────
# All non-sensitive configuration lives here.
# Sensitive values (API keys) go in .env — never here.
# ─────────────────────────────────────────────────────────────────────

# ── Classifier ───────────────────────────────────────────────────────
# Supported values:
#   logistic_regression  — fast linear baseline (default)
#   naive_bayes          — very fast; good for high-dimensional/sparse data
#   random_forest        — robust ensemble; handles non-linearity well
#   xgboost              — gradient boosting (requires: pip install xgboost)
#   lightgbm             — gradient boosting (requires: pip install lightgbm)
#   svm                  — RBF kernel SVM; strong on small datasets
classifier_model: "logistic_regression"
max_seq_len: 128
train_epochs: 3
train_batch_size: 16
learning_rate: 0.00002

# ── Embeddings (semantic novelty) ────────────────────────────────────
embedding_model: "all-MiniLM-L6-v2"

# ── Synthetic Generation ─────────────────────────────────────────────
synth_pool_multiplier: 3        # more pool candidates → reject decisions are more meaningful
synth_batch_size: 15            # bandit retrain/eval cadence + less noisy reward
llm_temperature: 0.85
llm_max_tokens: 512
llm_max_retries: 5
llm_retry_wait: 15

# ── Augmentation Modes ───────────────────────────────────────────────
# These replace the manual `target_size` / pool-size inputs exposed to users.
# Each mode is a named preset that drives pool_multiplier, rl_max_steps,
# early_stop_patience, and the bandit curation threshold together.
#
#   pool_multiplier  — synthetic candidates generated per real training row
#                      (n_synthetic = len(X_train) * pool_multiplier)
#   rl_max_steps     — hard cap on PPO episode steps (overrides rl_max_steps)
#   patience         — consecutive no-improvement rounds before early-stop
#   curation_threshold — minimum verifier confidence for bandit acceptance
#
# The "balanced" preset matches the legacy defaults so existing behaviour
# is preserved when no mode is explicitly passed.
augmentation_modes:
  fast:
    pool_multiplier: 2
    rl_max_steps: 10
    patience: 3
    curation_threshold: 0.40
  balanced:
    pool_multiplier: 4
    rl_max_steps: 40
    patience: 8
    curation_threshold: 0.45
  thorough:
    pool_multiplier: 6
    rl_max_steps: 100
    patience: 20
    curation_threshold: 0.55

# Default mode used when run_pipeline() is called without an explicit mode.
default_augmentation_mode: "balanced"

# ── Thompson bandit (curate / RL filter) ─────────────────────────────
# warm_start: forced accepts do NOT update the bandit posterior (exploration only).
bandit_warm_start: 2

# Contextual TS: extra weight on accept-arm draw from verifier confidence [0,1].
thompson_context_boost: 0.1

# After each batch, val-F1 delta is scaled/clipped then applied to the accept arm.
thompson_reward_scale: 20.0
thompson_reward_clip: 1.0

# ── Pipeline ─────────────────────────────────────────────────────────
num_iterations: 30
random_seed: 42
min_real_samples: 30
early_stop_patience: 8       # overridden per-mode at runtime
early_stop_delta: 0.005

# ── Data Splits ──────────────────────────────────────────────────────
val_ratio: 0.2
test_ratio: 0.2

# ── Outputs ──────────────────────────────────────────────────────────
output_dir: "outputs"

# ── RL agent (optional) ────────────────────────────────────────────────
# If rl_policy_path exists under the project directory, pipeline uses the PPO
# policy to choose generate / filter / retrain / evaluate / stop. Otherwise
# the Thompson bandit path is used.
rl_policy_path: "best_model.zip"
# If set and the file exists, observations are normalized with these stats
# (must match how the policy was trained). Leave empty to pass raw obs.
rl_vecnormalize_path: "vecnormalize_final.pkl"
# Episode cap — overridden by the active augmentation mode's rl_max_steps.
rl_max_steps: 40
# Budget: set rl_budget_scale_with_data: false to use rl_total_budget only.
rl_total_budget: 300
rl_budget_scale_with_data: true
rl_budget_base: 80
rl_budget_per_target_row: 1.2
rl_budget_per_real_row: 0.35
rl_budget_min: 120
rl_budget_max: 900